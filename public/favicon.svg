<!--
  Favicon — simplified for 16-32 px tab rendering.
  Drops the gradients, glows, route, and floating sparks from
  logo-mark.svg. Keeps the iconic silhouette: rounded dark square +
  hexagonal container outline + a stylised LF monogram inside +
  the two local/remote node dots.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="LocalForge">
  <rect width="32" height="32" rx="7" fill="#0b1020"/>

  <!-- Hexagonal container -->
  <path d="M16 4 L26 9.5 V22.5 L16 28 L6 22.5 V9.5 Z"
        fill="none" stroke="#60a5fa" stroke-width="1.6"
        stroke-linejoin="round"/>

  <!-- LF monogram, simplified.
       L stem + rounded corner + horizontal foot,
       F stem + top arm + middle arm. -->
  <path d="M11.5 10 v8 a2 2 0 0 0 2 2 h3.5"
        fill="none" stroke="#60a5fa" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17.5 21 V11.5 h5 M17.5 16 h3.8"
        fill="none" stroke="#a78bfa" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Local + remote node dots -->
  <circle cx="9"  cy="22" r="1.4" fill="#38bdf8"/>
  <circle cx="23" cy="11" r="1.4" fill="#a78bfa"/>
</svg>

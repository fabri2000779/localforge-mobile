<!--
  LocalForge — the "Crucible" brand mark (no initials).
  A hexagonal crucible (Docker/server container) with steel-forged edges,
  molten ember metal pooling at the base, and two nodes: a filled ember
  stud (local) + a hollow steel ring (remote). Local vs remote reads by
  SHAPE as well as colour, so it survives colour-blindness.
  Self-contained (no external refs) so it renders at any size in the WebView.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="LocalForge">
  <defs>
    <linearGradient id="lf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12161f"></stop>
      <stop offset="1" stop-color="#0a0d14"></stop>
    </linearGradient>
    <linearGradient id="lf-steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"></stop>
      <stop offset="1" stop-color="#38bdf8"></stop>
    </linearGradient>
    <linearGradient id="lf-ingot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdba74"></stop>
      <stop offset="0.45" stop-color="#f97316"></stop>
      <stop offset="1" stop-color="#c2410c"></stop>
    </linearGradient>
    <radialGradient id="lf-stud" cx="0.36" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#fdba74"></stop>
      <stop offset="0.55" stop-color="#f97316"></stop>
      <stop offset="1" stop-color="#c2410c"></stop>
    </radialGradient>
    <radialGradient id="lf-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.6"></stop>
      <stop offset="0.6" stop-color="#f97316" stop-opacity="0.12"></stop>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="116" height="116" rx="28" fill="url(#lf-bg)" stroke="rgba(148,163,184,0.16)" stroke-width="1.5"></rect>
  <g transform="translate(28 28) scale(0.64)">
    <polygon points="50,8 86.4,29 86.4,71 50,92 13.6,71 13.6,29" fill="#0d1422" stroke="url(#lf-steel)" stroke-width="6" stroke-linejoin="round"></polygon>
    <ellipse cx="50" cy="58" rx="30" ry="24" fill="url(#lf-glow)"></ellipse>
    <polygon points="13.6,55 86.4,55 86.4,71 50,92 13.6,71" fill="url(#lf-ingot)"></polygon>
    <rect x="15" y="53.4" width="70" height="3.4" rx="1.7" fill="#fdba74" opacity="0.8"></rect>
    <circle cx="13.6" cy="50" r="9.5" fill="url(#lf-stud)" stroke="#0a0d14" stroke-width="3"></circle>
    <circle cx="86.4" cy="50" r="9.5" fill="#0a0d14" stroke="url(#lf-steel)" stroke-width="5.5"></circle>
  </g>
</svg>

# Android APK / AAB build pipeline.
#
# Triggers
#   - Push to main → unsigned debug APK uploaded as artifact (smoke test
#     that the workspace still builds after every commit).
#   - Tag v* push → signed release APK + AAB uploaded as a GitHub
#     Release asset, ready for Play Console upload.
#
# Signing
#   The release path expects three secrets in the repo:
#       ANDROID_KEYSTORE_BASE64  — `base64 -w0 your.keystore` output
#       ANDROID_KEYSTORE_PASSWORD
#       ANDROID_KEY_ALIAS
#       ANDROID_KEY_PASSWORD
#   Set those and the release job decodes the keystore into
#   src-tauri/gen/android/.signing/release.keystore at build time.
#   Without the secrets the release job still runs and uploads an
#   UNSIGNED APK — useful while bootstrapping (you can side-load it
#   onto a test device via `adb install`), but Play Console rejects.
#
# Caching
#   Gradle dependencies live in ~/.gradle/caches — cached by
#   gradle/wrapper hash. The Rust target dir for the android targets
#   lives in src-tauri/target/<triple>; cached by Cargo.lock + tauri
#   conf hash.
#
# Toolchain
#   JDK 17 (Tauri 2 mobile baseline). NDK r26d (latest LTS). Android
#   SDK 35 (Tauri 2 targetSdk default). Stable rustup channel.

name: Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # for the release upload step

jobs:
  apk:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # Surface the Play publishing secret at JOB level so the upload step's
    # `if: env.… != ''` can see it. (Step-level env isn't reliably visible
    # to a step's own if — same lesson baked into ios.yml.)
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      # Free ~20 GB of disk on the runner before we start. The default
      # ubuntu-22.04 image only has ~14 GB free, which the Rust cross-
      # compile to four Android target-tripples + the gradle APK
      # packaging exhaust (run 2 died at packageUniversalDebug with
      # "No space left on device" 17 minutes in).
      #
      # IMPORTANT: do NOT remove /usr/local/lib/android/sdk/ndk — the
      # runner ships with a stable NDK pre-installed there and Tauri's
      # `android init` looks for it via ANDROID_NDK_LATEST_HOME. Using
      # the pre-cached one is faster AND avoids nttld/setup-ndk
      # downloading a duplicate (~3 GB wasted).
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY/Ruby" || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY/PyPy" || true
          sudo rm -rf /usr/share/swift || true
          sudo docker image prune --all --force || true
          echo "After:"
          df -h /

      - uses: actions/checkout@v6

      # Node first so Vite + the JS shell are ready before Cargo needs
      # them (tauri build does `npm run build` as a beforeBuildCommand).
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # SDK + tools. We don't ask for NDK here — the ubuntu-22.04
      # runner already ships one at $ANDROID_NDK_LATEST_HOME (currently
      # NDK 27.x on the actions-runner-images images), which is what
      # we re-export to NDK_HOME below. Skipping a separate NDK
      # download saves ~3 GB and bypasses the SDK-Preview-license
      # acceptance gate that bit run #1.
      - name: Install Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          accept-android-sdk-licenses: true

      - name: Expose NDK paths to subsequent steps
        run: |
          if [ -z "$ANDROID_NDK_LATEST_HOME" ]; then
            # Defensive: some runner image versions name it differently.
            # Pick the highest-numbered NDK directory under the SDK root.
            export ANDROID_NDK_LATEST_HOME=$(ls -d "$ANDROID_HOME"/ndk/*/ 2>/dev/null | sort -V | tail -1 | sed 's:/$::')
          fi
          echo "Picked NDK: $ANDROID_NDK_LATEST_HOME"
          echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
          # Tauri's android gen folder is generated at build time and
          # isn't worth caching (cheap to regenerate, churns daily).
          cache-on-failure: true

      - name: Generate Tauri Android project
        run: npx --no-install tauri android init --ci
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # ─── Signing (release only) ──────────────────────────────────
      # Only runs when the build is for a tag. Debug builds use the
      # default debug keystore Android Studio ships.
      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android/.signing
          # Strip any CR/LF/whitespace that PowerShell on the secret-
          # upload side may have added when piping the base64 file
          # through `gh secret set`. `base64 -d` in strict mode chokes
          # on a single \r and fails the whole pipeline an hour in.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 -d > src-tauri/gen/android/.signing/release.keystore
          # Sanity check that the resulting file is a real keystore.
          # The PKCS12 magic bytes are 30 82 (DER SEQUENCE).
          head -c 2 src-tauri/gen/android/.signing/release.keystore | xxd | grep -q '3082' \
            || (echo "Keystore decoded but doesn't look like a PKCS12/JKS file — secret may be corrupted"; exit 1)

      - name: Write key.properties
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/key.properties <<EOF
          storeFile=.signing/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # ─── Build ───────────────────────────────────────────────────
      - name: Build debug APK (push to main)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx --no-install tauri android build --debug --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build release APK + AAB (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx --no-install tauri android build --apk --aab
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # Tauri's generated build.gradle.kts doesn't reliably wire our
      # key.properties into the release signingConfig, so the AAB/APK
      # come out UNSIGNED ("Todos los bundles subidos deben estar
      # firmados" from Play Console). Sign them post-build instead —
      # deterministic, doesn't depend on Tauri template internals:
      #   - AAB → jarsigner (the upload signature; Play App Signing
      #     re-signs the delivered APKs itself, so a v1 JAR signature
      #     on the bundle is exactly what Play wants).
      #   - APK → apksigner with the v2/v3 scheme so the artifact is
      #     directly side-loadable via `adb install` for quick tests.
      - name: Sign AAB + APK (tag)
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KS="$(pwd)/src-tauri/gen/android/.signing/release.keystore"

          # Sign the FINAL output bundle, NOT the intermediary one.
          # v0.2.3's `-path '*bundle*'` matched
          # intermediates/.../intermediary-bundle.aab first (head -1),
          # signed that, and left the actual upload artifact in
          # outputs/bundle/ unsigned → Play still rejected it. Target
          # the outputs dir explicitly.
          AAB="$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' | head -1)"
          echo "→ Signing AAB: $AAB"
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$KS" -storetype PKCS12 \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -keypass "$ANDROID_KEY_PASSWORD" \
            "$AAB" "$ANDROID_KEY_ALIAS"
          jarsigner -verify "$AAB" && echo "✓ AAB signature verified"

          APK="$(find src-tauri/gen/android/app/build/outputs/apk -path '*release*' -name '*.apk' | head -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)"
          echo "→ Signing APK: $APK with $APKSIGNER"
          "$APKSIGNER" sign \
            --ks "$KS" --ks-type PKCS12 \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            "$APK"
          "$APKSIGNER" verify --print-certs "$APK" && echo "✓ APK signature verified"

      # ─── Output ──────────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7
        with:
          name: LocalForge-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          draft: true
          fail_on_unmatched_files: false

      # Push the signed AAB straight to Play → internal testing track,
      # mirroring the iOS TestFlight upload. Needs:
      #   * GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret — the FULL service-
      #     account JSON (can be the same account used for IAP verify),
      #     granted "Release to testing tracks" on this app in Play
      #     Console → Users & permissions.
      #   * The app's FIRST release must already exist in the Play Console
      #     (created by hand once); the API can't bootstrap a brand-new app.
      #   * versionCode must strictly increase per upload — Tauri derives
      #     it from the app version, so bump the version on each release tag.
      # Without the secret this step is skipped (the GitHub Release asset
      # above is still produced for manual upload).
      - name: Upload AAB to Play (internal testing)
        if: startsWith(github.ref, 'refs/tags/v') && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.localforge.mobile
          releaseFiles: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          track: internal
          status: completed

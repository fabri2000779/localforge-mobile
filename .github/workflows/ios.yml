# iOS IPA build pipeline.
#
# Triggers: tag v* OR manual workflow_dispatch. NOT on every main push
# because macos-14 runners are 10× the minute cost of ubuntu-22.04 and
# we'd burn the free GitHub Actions quota in a day on iteration noise.
#
# Signing
#   The signed-IPA path expects these secrets:
#       IOS_TEAM_ID                — your Apple Developer team id
#       IOS_CERTIFICATE_BASE64     — base64'd .p12 export from Keychain
#       IOS_CERTIFICATE_PASSWORD   — the .p12 password
#       IOS_PROVISIONING_PROFILE_BASE64  — base64 of the .mobileprovision
#   Without these, the build still produces an UNSIGNED .app — useful
#   for the iOS Simulator but rejected by Xcode for device install.
#
# Toolchain
#   macos-14 (Apple Silicon runner, ~2× faster than macos-13 Intel for
#   Rust cross-compile to aarch64-apple-ios).
#   Xcode whatever-actions-default-to (Xcode 16 currently).
#   Rust stable, aarch64-apple-ios + x86_64-apple-ios + aarch64-apple-ios-sim targets.

name: iOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ipa:
    name: Build IPA
    # Apple requires the iOS 26 SDK (Xcode 26+) for App Store uploads AND
    # rejects anything built with a *beta* Xcode. The macos-26 image leads
    # with Xcode 26.5 BETA (upload rejected: "built with a beta… use the
    # latest RC"), so use macos-15: it ships STABLE Xcode 26 (up to 26.3)
    # next to Xcode 16. The "Select Xcode" step pins the newest stable 26.
    runs-on: macos-15
    timeout-minutes: 90
    # Surface the signing secrets at JOB level so the `if:
    # env.IOS_CERTIFICATE_BASE64 != ''` conditions on later steps can
    # actually see them — step-level env vars aren't visible to other
    # steps' if-conditions, which is why v0.2.3 silently fell through
    # to the unsigned build path.
    env:
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      # App Store Connect API key (for xcodebuild auto-provisioning).
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
      # Tauri's iOS init/build reads the signing team from
      # APPLE_DEVELOPMENT_TEAM (not IOS_TEAM_ID). Setting it at job
      # level means `tauri ios init` bakes DEVELOPMENT_TEAM into the
      # generated .xcodeproj and `tauri ios build` picks the matching
      # App Store provisioning profile we installed.
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      # Select Xcode 26 (required: App Store wants the iOS 26 SDK) and make
      # sure the iOS platform/runtime is actually installed. Prefer a
      # STABLE 26 over a beta — the macos-26 image's beta Xcode ships
      # without the iOS runtime, so `xcodebuild -sdk iphoneos build` finds
      # "no destinations" (Tauri can't pass -destination on 2.11.x).
      - name: Select Xcode 26 + install iOS platform
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          [ -z "$XC" ] && XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          [ -z "$XC" ] && XC="/Applications/Xcode.app"
          echo "Selecting $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version
          # Ensure the iOS platform (incl. a runtime) is present so a
          # generic iOS destination exists. Idempotent + best-effort.
          xcodebuild -downloadPlatform iOS -quiet || sudo xcodebuild -downloadPlatform iOS || true
          echo "── iOS SDKs ──"; xcodebuild -showsdks | grep -i iphoneos || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
          cache-on-failure: true

      # ─── Signing ─────────────────────────────────────────────────
      # Tauri does iOS signing ITSELF from its own env vars: given
      # IOS_CERTIFICATE / IOS_CERTIFICATE_PASSWORD / IOS_MOBILE_PROVISION
      # it imports the .p12 into a temporary keychain, installs the
      # provisioning profile, and configures MANUAL signing. Lessons from
      # the earlier failures, baked in here:
      #   * Don't hand-roll a keychain import under custom var names —
      #     Tauri never looks there, so it reported "No code signing
      #     certificates found" and self-signed an "Apple Distribution:
      #     Tauri (unset)" placeholder.
      #   * Don't ALSO pass an App Store Connect API key. Manual and
      #     automatic (cloud) signing are mutually exclusive; feeding both
      #     pushed xcodebuild onto cloud signing → "Cloud signing
      #     permission error / No profiles for com.localforge.mobile".
      # The signing team comes from the job-level APPLE_DEVELOPMENT_TEAM.
      # (The App Store Connect API key still lives in the secrets and
      # powers IAP receipt verification on the cloud — a separate use.)
      - name: Generate Tauri iOS project
        run: npx --no-install tauri ios init --ci

      # Tauri iOS plugins decode their command args with JSONDecoder over
      # Codable types defined inside the plugin's Swift Package
      # (tauri-plugin-iap). Xcode's DEAD_CODE_STRIPPING drops those types'
      # runtime metadata, so decoding traps in
      # __swift_instantiateConcreteTypeFromMangledName and the app crashes
      # the moment the IAP plugin runs (getProducts on the paywall). This
      # is the documented workaround for Swift SR-11564. Disable it across
      # every build configuration in the generated project. (`sed -i ''`
      # is BSD/macOS syntax — the runner is macOS.)
      - name: Disable dead-code stripping (Swift Codable metadata fix)
        run: |
          PBX=$(ls src-tauri/gen/apple/*.xcodeproj/project.pbxproj | head -1)
          echo "Patching $PBX"
          sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tDEAD_CODE_STRIPPING = NO;/g' "$PBX"
          echo "DEAD_CODE_STRIPPING entries: $(grep -c "DEAD_CODE_STRIPPING = NO" "$PBX")"

      # ─── Build ───────────────────────────────────────────────────
      - name: Build IPA (signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          # Manual-signing inputs Tauri reads natively (it imports the
          # cert, installs the profile, sets CODE_SIGN_STYLE=Manual + the
          # profile specifier). Secrets keep their historical *_BASE64
          # names; both base64 values are stored unwrapped so Tauri's
          # strict decoder accepts them.
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          # ALSO give it the App Store Connect API key. With manual signing
          # Tauri still runs the build phase with signing REQUIRED and
          # always passes `-allowProvisioningUpdates`; offline (no key) that
          # phase can't validate the profile and dies with "requires a
          # provisioning profile". The key lets xcodebuild authenticate and
          # resolve the (locally installed) profile. Same key as the IAP
          # backend uses.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | tr -d '\r\n\t ' | base64 -D \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8
          export APPLE_API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          npx --no-install tauri ios build --export-method app-store-connect

      # Diagnostic: when the signed build fails on "requires a provisioning
      # profile", show what Tauri actually wrote to the project and whether
      # `security cms -D` (the exact call Tauri's uuid() makes) can decode
      # the installed profile. Runs even on failure.
      - name: Diagnose iOS signing
        if: always() && env.IOS_CERTIFICATE_BASE64 != ''
        run: |
          echo "── pbxproj signing settings ──"
          grep -hoE "(CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER|DEVELOPMENT_TEAM|CODE_SIGN_IDENTITY|PRODUCT_BUNDLE_IDENTIFIER)[^;]*;" src-tauri/gen/apple/*.xcodeproj/project.pbxproj | sort -u || true
          echo "── installed provisioning profiles ──"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || true
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            [ -e "$p" ] || continue
            echo "profile: $p"
            if security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null; then
              echo "  UUID:  $(plutil -extract UUID raw /tmp/pp.plist 2>/dev/null)"
              echo "  Name:  $(plutil -extract Name raw /tmp/pp.plist 2>/dev/null)"
              echo "  AppID: $(plutil -extract Entitlements.application-identifier raw /tmp/pp.plist 2>/dev/null)"
            else
              echo "  !! security cms -D FAILED — this is exactly what Tauri uuid() runs"
            fi
          done

      - name: Build .app (unsigned, simulator-only)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        run: npx --no-install tauri ios build

      # ─── Output ──────────────────────────────────────────────────
      # Push the signed IPA straight to App Store Connect → TestFlight.
      # Done in CI because the build host is the only Mac in the loop (the
      # dev machine is Windows, so Transporter isn't an option). Uses the
      # same App Store Connect API key as signing + IAP verification;
      # altool finds it by id/issuer in ~/.appstoreconnect/private_keys.
      - name: Upload IPA to TestFlight
        if: startsWith(github.ref, 'refs/tags/v') && env.IOS_CERTIFICATE_BASE64 != ''
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | tr -d '\r\n\t ' | base64 -D \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8
          IPA=$(ls src-tauri/gen/apple/build/arm64/*.ipa | head -1)
          echo "Uploading $IPA to App Store Connect…"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$APPLE_API_KEY" --apiIssuer "$APPLE_API_ISSUER"

      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/v') && env.IOS_CERTIFICATE_BASE64 != ''
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/apple/build/arm64/*.ipa
          draft: true
          fail_on_unmatched_files: false

      - name: Upload unsigned .app for inspection
        if: env.IOS_CERTIFICATE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: LocalForge-ios-app-unsigned
          path: src-tauri/gen/apple/build/arm64/*.app
          if-no-files-found: warn
          retention-days: 14

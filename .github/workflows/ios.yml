# iOS IPA build pipeline.
#
# Triggers: tag v* OR manual workflow_dispatch. NOT on every main push
# because macos-14 runners are 10× the minute cost of ubuntu-22.04 and
# we'd burn the free GitHub Actions quota in a day on iteration noise.
#
# Signing
#   The signed-IPA path expects these secrets:
#       IOS_TEAM_ID                — your Apple Developer team id
#       IOS_CERTIFICATE_BASE64     — base64'd .p12 export from Keychain
#       IOS_CERTIFICATE_PASSWORD   — the .p12 password
#       IOS_PROVISIONING_PROFILE_BASE64  — base64 of the .mobileprovision
#   Without these, the build still produces an UNSIGNED .app — useful
#   for the iOS Simulator but rejected by Xcode for device install.
#
# Toolchain
#   macos-14 (Apple Silicon runner, ~2× faster than macos-13 Intel for
#   Rust cross-compile to aarch64-apple-ios).
#   Xcode whatever-actions-default-to (Xcode 16 currently).
#   Rust stable, aarch64-apple-ios + x86_64-apple-ios + aarch64-apple-ios-sim targets.

name: iOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ipa:
    name: Build IPA
    # macos-15 ships Xcode 16.x. macos-14 only has Xcode 15, which
    # can't open the objectVersion-77 .xcodeproj that `tauri ios init`
    # generates ("future Xcode project file format (77)").
    runs-on: macos-15
    timeout-minutes: 90
    # Surface the signing secrets at JOB level so the `if:
    # env.IOS_CERTIFICATE_BASE64 != ''` conditions on later steps can
    # actually see them — step-level env vars aren't visible to other
    # steps' if-conditions, which is why v0.2.3 silently fell through
    # to the unsigned build path.
    env:
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      # App Store Connect API key (for xcodebuild auto-provisioning).
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
      # Tauri's iOS init/build reads the signing team from
      # APPLE_DEVELOPMENT_TEAM (not IOS_TEAM_ID). Setting it at job
      # level means `tauri ios init` bakes DEVELOPMENT_TEAM into the
      # generated .xcodeproj and `tauri ios build` picks the matching
      # App Store provisioning profile we installed.
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      # Pin to the newest stable Xcode the runner has. macos-15 carries
      # 16.x which understands the project format Tauri emits.
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
          cache-on-failure: true

      # ─── Signing (when secrets exist) ────────────────────────────
      - name: Install signing assets
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Strip CR/LF/whitespace before decode — `gh secret set`
          # piped from PowerShell on Windows injects a trailing CRLF
          # that macOS's strict base64 chokes on. tr-then-decode is
          # the robust path regardless of how the secret got uploaded.
          printf '%s' "$IOS_CERTIFICATE_BASE64" | tr -d '\r\n\t ' | base64 -D > /tmp/cert.p12
          # Provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | tr -d '\r\n\t ' | base64 -D \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/lf-mobile.mobileprovision"
          # Custom keychain so we don't mutate the runner's default
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          # Apple WWDR G3 intermediate — the ISSUER of the distribution
          # cert. The .p12 ships only the leaf, so without its issuer in
          # the keychain the chain can't be validated and
          # `security find-identity -v -p codesigning` returns nothing.
          # That's why Tauri kept reporting "No code signing certificates
          # found" and self-signed an "Apple Distribution: Tauri (unset)"
          # placeholder, which then failed exportArchive.
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/wwdr.cer
          security import /tmp/wwdr.cer -k build.keychain -T /usr/bin/codesign || true
          rm -f /tmp/wwdr.cer
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          # CRITICAL: add build.keychain to the SEARCH LIST. `default-keychain
          # -s` above only marks it default; xcodebuild's code-signing identity
          # lookup walks the *search list*, so without this the imported
          # "Apple Distribution" cert is invisible — the build warns "No code
          # signing certificates found", falls back to a self-signed
          # "Tauri (unset)" placeholder, and exportArchive then dies with
          # "Cloud signing permission error / No profiles for <bundle>".
          # Prepend ours; keep the runner's existing keychains so the rest of
          # the toolchain still resolves its own certs.
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed -e 's/"//g')
          # Archive + export outlast the 300s default auto-lock; a mid-build
          # lock makes codesign fail with errSecAuthFailed. Bump to 6h and
          # drop the lock-on-sleep.
          security set-keychain-settings -lut 21600 build.keychain
          rm /tmp/cert.p12
          # Diagnostic: this MUST list "Apple Distribution: Fabrizio
          # Lamanna (BMB457M9HR)" as a valid identity. If it shows
          # "0 valid identities found", the chain still isn't resolving
          # and Tauri will self-sign a placeholder again.
          echo "── valid codesigning identities ──"
          security find-identity -v -p codesigning

      # App Store Connect API key for xcodebuild's -allowProvisioningUpdates.
      # Without this, the build dies with "No Accounts: Add a new account
      # in Accounts settings" because automatic signing needs an Apple
      # login the headless runner doesn't have. The API key lets
      # xcodebuild authenticate + auto-generate/download the App Store
      # provisioning profile non-interactively. Tauri's ios build reads
      # APPLE_API_KEY / APPLE_API_ISSUER / APPLE_API_KEY_PATH and passes
      # them through to xcodebuild.
      #
      # This is the SAME App Store Connect API key used for IAP receipt
      # verification on the cloud (Fase 2-B) — one key, two uses.
      - name: Install App Store Connect API key
        if: env.APPLE_API_PRIVATE_KEY_BASE64 != ''
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | tr -d '\r\n\t ' | base64 -D \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Generate Tauri iOS project
        run: npx --no-install tauri ios init --ci

      # ─── Build ───────────────────────────────────────────────────
      - name: Build IPA (signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          # Hand the API key to Tauri → xcodebuild for automatic
          # provisioning. Path is the canonical location Apple tools
          # look in, so APPLE_API_KEY_PATH could be omitted, but we set
          # it explicitly for clarity.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          export APPLE_API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          npx --no-install tauri ios build --export-method app-store-connect

      - name: Build .app (unsigned, simulator-only)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        run: npx --no-install tauri ios build

      # ─── Output ──────────────────────────────────────────────────
      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/v') && env.IOS_CERTIFICATE_BASE64 != ''
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/apple/build/arm64/*.ipa
          draft: true
          fail_on_unmatched_files: false

      - name: Upload unsigned .app for inspection
        if: env.IOS_CERTIFICATE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: LocalForge-ios-app-unsigned
          path: src-tauri/gen/apple/build/arm64/*.app
          if-no-files-found: warn
          retention-days: 14
